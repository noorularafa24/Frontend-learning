<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panda Navbar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="2xl:container mx-auto ">
    <header class="w-full bg-blue-300">
  <!-- Navbar -->
  <nav class="flex flex-col md:flex-row justify-between items-center mx-auto w-[95%] p-2">
    
    <!-- Logo & Toggle Section -->
    <div class="flex flex-row justify-between items-center w-full md:w-auto font-bold text-[20px]">
      <img src="./pandalogo-removebg-preview.png" alt="Logo" class="h-12" />

      <!-- Hamburger / Cross Icons -->
      <div class="md:hidden cursor-pointer">
        <svg id="menu" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8">
          <path fill-rule="evenodd" d="M3 6.75A.75.75 0 0 1 3.75 6h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 6.75ZM3 12a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 12Zm0 5.25a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" />
        </svg>

        <!-- Initially hidden cross icon -->
        <svg id="cross" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8 hidden">
          <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
        </svg>
      </div>
    </div>

    <!-- Navlinks: hidden by default on mobile, flex on md+ -->
    <div id="content" class="hidden md:flex w-full md:w-auto transition-all duration-300">
      <ul class="flex flex-col md:flex-row justify-center items-center gap-6 py-4 md:py-0 w-full">
        <li class="font-medium hover:text-white cursor-pointer">Home</li>
        <li class="font-medium hover:text-white cursor-pointer">About</li>
        <li class="font-medium hover:text-white cursor-pointer">Contact</li>
      </ul>
    </div>
  </nav>
  </header>

  <script>
    const menuicon = document.getElementById("menu");
    const crossicon = document.getElementById("cross");
    const contentEle = document.getElementById("content");

    menuicon.addEventListener("click", () => {
      crossicon.classList.remove("hidden");
      menuicon.classList.add("hidden");
      // On mobile, remove hidden to show the vertical list
      contentEle.classList.remove("hidden");
    });

    crossicon.addEventListener("click", () => {
      menuicon.classList.remove("hidden");
      crossicon.classList.add("hidden");
      // On mobile, add hidden to hide the vertical list
      contentEle.classList.add("hidden");
    });
  </script>

</body>
</html>
