<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-300 via-emerald-400 to-teal-500 flex items-center justify-center p-4">
  <div class="bg-white/20 backdrop-blur-lg shadow-2xl rounded-2xl p-6 w-full max-w-md border border-white/30">
    <h1 class="text-3xl font-bold text-slate-800 text-center mb-6">My Todo App</h1>

    <div class="flex gap-2 mb-6">
      <input id="todoInput" type="text" placeholder="Enter task..."
        class="flex-1 px-4 py-2 rounded-lg outline-none bg-white/70 text-black">
      <button onclick="addTask()"
        class="bg-white text-emerald-900 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200">
        Add
      </button>
    </div>

    <ul id="todoList" class="space-y-3"></ul>
  </div>

  <script>
    let tasks = [];

    function renderTasks() {
      const list = document.getElementById("todoList");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        const li = document.createElement("li");

        li.className = "bg-white/70 p-3 rounded-lg flex justify-between items-center";

        li.innerHTML = `
          <span class="${task.completed ? 'line-through text-gray-500' : 'text-black'} cursor-pointer"
            onclick="toggleTask(${index})">
            ${task.text}
          </span>
          <button onclick="deleteTask(${index})"
            class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
            Delete
          </button>
        `;

        list.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById("todoInput");
      const value = input.value.trim();

      if (value === "") {
        alert("Please enter a task");
        return;
      }

      tasks.push({
        text: value,
        completed: false
      });

      input.value = "";
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      renderTasks();
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      renderTasks();
    }

    document.getElementById("todoInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        addTask();
      }
    });
  </script>

</body>
</html>
